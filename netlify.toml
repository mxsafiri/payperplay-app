[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PAYMENT_PROVIDER = "snippe"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Prevent caching of authenticated pages — session cookies must be sent to server
# Without this, Netlify's Durable Cache serves stale static HTML and users appear logged out
[[headers]]
  for = "/creator/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

